baseURL: "https://gainbandwidth.github.io/"
locale: "zh"
title: "顾博文的技术博客"
theme: "PaperMod"
paginate: 10

# 默认元数据
defaultContentLanguage: "zh"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# 输出格式（支持搜索）
outputs:
  home:
    - HTML
    - RSS
    - JSON # 用于搜索功能

# 文章永久链接格式
permalinks:
  posts: "/posts/:year/:month/:title/"
  essays: "/essays/:year/:month/:title/"

# 分类与标签
taxonomies:
  tag: tags
  category: categories

# 站点参数
params:
  env: production
  title: "顾博文的技术博客"
  description: "东南大学信息与通信工程硕士 —— 记录大模型、AI Agent 与技术成长"
  author: "顾博文"

  # 默认显示设置
  defaultTheme: auto # 自动切换亮/暗色模式
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableScrollToTop: false

  # 首页布局
  homeInfoParams:
    Title: "Hi, I'm Bowen"
    Content: "东南大学信息与通信工程硕士，研究方向为大模型与 AI Agent。这里记录我的项目和笔记。"

  # 社交链接（按需修改）
  socialIcons:
    - name: github
      url: "https://github.com/gainbandwidth"
    - name: email
      url: "mailto:220240948@seu.edu.cn"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # 代码高亮
  assets:
    favicon: "/favicon.ico"
    disableHLJS: false

# 菜单导航
menu:
  main:
    - identifier: projects
      name: "项目"
      url: projects/
      weight: 10
    - identifier: posts
      name: "笔记"
      url: posts/
      weight: 20
    - identifier: about
      name: "关于"
      url: about/
      weight: 30
    - identifier: search
      name: "搜索"
      url: search
      weight: 40

# Markdown 渲染
markup:
  highlight:
    noClasses: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true # 允许 HTML 嵌入

# 隐私设置
privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true
