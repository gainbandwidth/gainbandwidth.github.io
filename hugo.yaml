baseURL: "https://gainbandwidth.github.io/"
locale: "zh"
title: "GainBandwidth's Blog"
theme: "PaperMod"
paginate: 10

# 默认元数据
defaultContentLanguage: "zh"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# 输出格式（支持搜索）
outputs:
  home:
    - HTML
    - RSS
    - JSON # 用于搜索功能

# 文章永久链接格式
permalinks:
  posts: "/posts/:year/:month/:title/"
  essays: "/essays/:year/:month/:title/"

# 分类与标签
taxonomies:
  tag: tags
  category: categories

# 站点参数
params:
  env: production
  title: "GainBandwidth's Blog"
  description: "一个计算机学生的技术博客 —— 记录学习、项目与思考"
  author: "GainBandwidth"

  # 默认显示设置
  defaultTheme: auto # 自动切换亮/暗色模式
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableScrollToTop: false

  # 首页布局
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: "欢迎来到我的博客！这里记录我的学习笔记、项目经历和技术思考。"

  # 社交链接（按需修改）
  socialIcons:
    - name: github
      url: "https://github.com/gainbandwidth"
    - name: email
      url: "mailto:your-email@example.com"

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # 代码高亮
  assets:
    favicon: "/favicon.ico"
    disableHLJS: false

# 菜单导航
menu:
  main:
    - identifier: search
      name: "\U0001F50D 搜索"
      url: search
      weight: 5
    - identifier: posts
      name: "\U0001F4DD 博客"
      url: posts/
      weight: 10
    - identifier: projects
      name: "\U0001F6E0\U000FE0F 项目"
      url: projects/
      weight: 20
    - identifier: essays
      name: "\U0001F4AD 随笔"
      url: essays/
      weight: 30
    - identifier: resources
      name: "\U0001F4DA 资源"
      url: resources/
      weight: 40
    - identifier: archives
      name: "\U0001F5C3\U000FE0F 归档"
      url: archives/
      weight: 50
    - identifier: about
      name: "\U0001F464 关于"
      url: about/
      weight: 60

# Markdown 渲染
markup:
  highlight:
    noClasses: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true # 允许 HTML 嵌入

# 隐私设置
privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true
